name: Video MUX
icon: video

fields:
  location:
    type: radio
    columns: 2
    default: "local"
    required: true
    options:
      local: Local
      external: Direct Link
  playback_id:
    label: Playback ID
    type: text
    placeholder: eg. RBahcpZAJBVL2de2ELFaj4zynY00rn5SFNf3c02r8iUKE
    when:
      location: external
  resolution_x:
    label: Width
    type: number
    width: 1/2
    when:
      location: external
  resolution_y:
    label: Height
    type: number
    width: 1/2
    when:
      location: external
  video:
    type: files
    layout: cards
    size: full
    multiple: false
    query: page.files.template('mux-video')
    uploads:
      template: mux-video
    image:
      ratio: 16/9
    when:
      location: local
  caption:
    label: field.blocks.video.caption
    type: text
    width: 1/2
    inline: true
  allow_sound:
    label: Play sound with video
    type: toggle
    width: 1/4
    default: true
  teaser:
    label: Teaser Video
    type: files
    layout: cards
    size: huge
    width: 1/2
    multiple: false
    query: page.files.template('teaser')
    uploads:
      template: teaser
    image:
      ratio: 16/9
      back: pattern