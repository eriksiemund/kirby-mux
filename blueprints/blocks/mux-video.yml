name: Video MUX
icon: video
fields:
  video:
    label: field.blocks.video.name
    type: files
    query: page.files.template('mux-video')
    uploads:
      template: mux-video
    multiple: false
    min: 1
    max: 1
    required: true
    layout: cards
    size: full
    image:
      ratio: 16/9
      back: black
  caption:
    label: field.blocks.video.caption
    type: text
    inline: true
    width: 1/2
  allow_sound:
    label: Play sound with video
    type: toggle
    width: 1/2
    default: true