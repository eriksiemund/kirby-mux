name: Video MUX
icon: video
fields:
  video:
    label: field.blocks.video.name
    type: files
    layout: cards
    size: full
    required: true
    multiple: false
    min: 1
    max: 1
    query: page.files.template('mux-video')
    uploads:
      template: mux-video
    image:
      ratio: 16/9
  caption:
    label: field.blocks.video.caption
    type: text
    width: 1/2
    inline: true
  allow_sound:
    label: Play sound with video
    type: toggle
    width: 1/4
    default: true
